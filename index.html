<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UniMap 3D — Mapa do Campus</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Syne:wght@400;700;800&display=swap');
 
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --accent: #4ade80;
    --accent2: #60a5fa;
    --accent3: #f59e0b;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --border: rgba(255,255,255,0.08);
    --glow: rgba(74,222,128,0.15);
  }
 
  * { margin:0; padding:0; box-sizing:border-box; }
 
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    height: 100vh;
    overflow: hidden;
    user-select: none;
  }
 
  /* HEADER */
  #header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(10,14,26,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  #header .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.3rem;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.5px;
  }
  #header .subtitle { color: var(--muted); font-size: 0.75rem; margin-top: 2px; }
 
  /* SEARCH */
  #search-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 40px;
    padding: 8px 18px;
    width: 320px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  #search-bar:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }
  #search-bar input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 0.9rem;
    width: 100%;
  }
  #search-bar input::placeholder { color: var(--muted); }
  #search-icon { color: var(--muted); font-size: 1rem; }
 
  /* AUTOCOMPLETE */
  #autocomplete {
    position: fixed;
    top: 64px;
    left: 50%;
    transform: translateX(-50%);
    width: 360px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    z-index: 200;
    box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    display: none;
  }
  .ac-item {
    padding: 12px 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: background 0.15s;
    border-bottom: 1px solid var(--border);
  }
  .ac-item:last-child { border-bottom: none; }
  .ac-item:hover { background: var(--surface2); }
  .ac-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .ac-info .ac-name { font-size: 0.88rem; font-weight: 500; }
  .ac-info .ac-desc { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }
 
  /* CANVAS */
  #canvas-wrap {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    overflow: hidden;
  }
  canvas { display: block; }
 
  /* SIDE PANEL */
  #panel {
    position: fixed;
    top: 70px;
    right: 20px;
    width: 280px;
    background: rgba(17,24,39,0.92);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    z-index: 90;
    transform: translateX(320px);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    max-height: calc(100vh - 100px);
    overflow-y: auto;
  }
  #panel.open { transform: translateX(0); }
  #panel h3 {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  #panel .p-type {
    font-size: 0.75rem;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
    margin-bottom: 14px;
  }
  .p-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
    align-items: flex-start;
  }
  .p-icon { font-size: 1rem; margin-top: 2px; flex-shrink: 0; }
  .p-label { font-size: 0.75rem; color: var(--muted); }
  .p-val { font-size: 0.88rem; margin-top: 2px; }
  #panel .rooms-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    margin-top: 12px;
  }
  .room-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 0.78rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: center;
  }
  .room-chip:hover {
    border-color: var(--accent2);
    background: rgba(96,165,250,0.1);
    color: var(--accent2);
  }
  #close-panel {
    position: absolute;
    top: 14px; right: 14px;
    background: var(--surface2);
    border: none;
    color: var(--muted);
    border-radius: 50%;
    width: 28px; height: 28px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.2s, background 0.2s;
  }
  #close-panel:hover { color: var(--text); background: var(--surface); }
 
  /* LEGEND */
  #legend {
    position: fixed;
    bottom: 20px;
    left: 20px;
    background: rgba(17,24,39,0.9);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    z-index: 90;
    min-width: 200px;
  }
  #legend h4 {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    margin-bottom: 10px;
    font-weight: 600;
  }
  .leg-item {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    padding: 4px 6px;
    border-radius: 6px;
    transition: background 0.15s;
  }
  .leg-item:hover { background: var(--surface2); }
  .leg-item:last-child { margin-bottom: 0; }
  .leg-box { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .leg-label { font-size: 0.8rem; color: var(--text); }
 
  /* CONTROLS */
  #controls {
    position: fixed;
    bottom: 20px;
    right: 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    z-index: 90;
  }
  .ctrl-btn {
    width: 42px; height: 42px;
    background: rgba(17,24,39,0.9);
    backdrop-filter: blur(16px);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .ctrl-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px var(--glow);
  }
 
  /* TOOLTIP */
  #tooltip {
    position: fixed;
    background: rgba(10,14,26,0.95);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 0.82rem;
    pointer-events: none;
    z-index: 300;
    display: none;
    backdrop-filter: blur(10px);
    white-space: nowrap;
  }
 
  /* FLOOR SELECTOR */
  #floor-sel {
    position: fixed;
    top: 50%;
    left: 20px;
    transform: translateY(-50%);
    display: flex;
    flex-direction: column;
    gap: 6px;
    z-index: 90;
  }
  .floor-btn {
    width: 38px; height: 38px;
    background: rgba(17,24,39,0.85);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
    font-family: 'Syne', sans-serif;
  }
  .floor-btn.active, .floor-btn:hover {
    border-color: var(--accent2);
    color: var(--accent2);
    background: rgba(96,165,250,0.1);
  }
 
  /* HINT */
  #hint {
    position: fixed;
    bottom: 74px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(10,14,26,0.8);
    border: 1px solid var(--border);
    border-radius: 30px;
    padding: 8px 20px;
    font-size: 0.75rem;
    color: var(--muted);
    z-index: 90;
    pointer-events: none;
    animation: fadeHint 4s ease forwards;
  }
  @keyframes fadeHint {
    0%,60%{opacity:1}100%{opacity:0}
  }
 
  /* MINIMAP */
  #minimap {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(17,24,39,0.85);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px;
    z-index: 90;
  }
  #minimap canvas { border-radius: 6px; display: block; }
  #minimap p { font-size: 0.65rem; color: var(--muted); text-align: center; margin-top: 4px; letter-spacing: 0.5px; }
 
  /* SCROLLBAR */
  #panel::-webkit-scrollbar { width: 4px; }
  #panel::-webkit-scrollbar-track { background: transparent; }
  #panel::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 2px; }
 
  .highlight-pulse {
    animation: pulse 1s ease-out 3;
  }
</style>
</head>

];
 
const TREES = [

  {x:80,z:150},{x:80,z:310},
  {x:600,z:150},{x:600,z:310},
  {x:420,z:200},{x:200,z:200},
  {x:230,z:380},{x:410,z:380},{x:560,z:380},
  {x:680,z:220},{x:680,z:300},
];
 
// ===================== CANVAS SETUP =====================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
 
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  draw();
}
window.addEventListener('resize', resize);
 
// ===================== CAMERA =====================
let cam = {
  angleX: 0.52, angleY: 0.6,
  zoom: 1.0,
  tx: 0, tz: 0,
  targetAngleX: 0.52, targetAngleY: 0.6,
  targetZoom: 1.0,
};
 
const CX_WORLD = 390, CZ_WORLD = 220;
 
// ===================== INTERACTION =====================
let drag = false, lastMX, lastMY;
 
canvas.addEventListener('mousedown', e => {
  drag = true; lastMX = e.clientX; lastMY = e.clientY;
});
window.addEventListener('mouseup', () => drag = false);
window.addEventListener('mousemove', e => {
  if (!drag) { handleHover(e); return; }
  const dx = e.clientX - lastMX, dy = e.clientY - lastMY;
  cam.targetAngleY += dx * 0.008;
  cam.targetAngleX += dy * 0.006;
  cam.targetAngleX = Math.max(0.2, Math.min(1.3, cam.targetAngleX));
  lastMX = e.clientX; lastMY = e.clientY;
});
canvas.addEventListener('wheel', e => {
  cam.targetZoom -= e.deltaY * 0.001;
  cam.targetZoom = Math.max(0.4, Math.min(2.5, cam.targetZoom));
  e.preventDefault();
}, {passive:false});
 
// Touch
let lastTouches = [];
canvas.addEventListener('touchstart', e => { lastTouches = [...e.touches]; }, {passive:true});
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 1) {
    const dx = e.touches[0].clientX - lastTouches[0].clientX;
    const dy = e.touches[0].clientY - lastTouches[0].clientY;
    cam.targetAngleY += dx * 0.01;
    cam.targetAngleX += dy * 0.008;
    cam.targetAngleX = Math.max(0.2, Math.min(1.3, cam.targetAngleX));
  } else if (e.touches.length === 2) {
    const prevDist = Math.hypot(lastTouches[1].clientX-lastTouches[0].clientX, lastTouches[1].clientY-lastTouches[0].clientY);
    const curDist = Math.hypot(e.touches[1].clientX-e.touches[0].clientX, e.touches[1].clientY-e.touches[0].clientY);
    cam.targetZoom *= curDist / prevDist;
    cam.targetZoom = Math.max(0.4, Math.min(2.5, cam.targetZoom));
  }
  lastTouches = [...e.touches];
  e.preventDefault();
}, {passive:false});
 
canvas.addEventListener('click', e => {
  const b = pickBuilding(e.clientX, e.clientY);
  if (b) openPanel(b);
  else closePanel();
});
 
// Controls
document.getElementById('btn-zoom-in').onclick = () => { cam.targetZoom = Math.min(2.5, cam.targetZoom + 0.3); };
document.getElementById('btn-zoom-out').onclick = () => { cam.targetZoom = Math.max(0.4, cam.targetZoom - 0.3); };
document.getElementById('btn-reset').onclick = () => { cam.targetAngleX=0.52; cam.targetAngleY=0.6; cam.targetZoom=1.0; };
document.getElementById('btn-top').onclick = () => { cam.targetAngleX=1.25; cam.targetZoom=0.9; };
 
// ===================== 3D PROJECTION =====================
function project(x, y, z) {
  const ax = cam.angleX, ay = cam.angleY;
  const rx = x - CX_WORLD, rz = z - CZ_WORLD;
  const cosY = Math.cos(ay), sinY = Math.sin(ay);
  const x2 = rx * cosY - rz * sinY;
  const z2 = rx * sinY + rz * cosY;
  const cosX = Math.cos(ax), sinX = Math.sin(ax);
  const y2 = y * cosX - z2 * sinX;
  const z3 = y * sinX + z2 * cosX;
  const scale = cam.zoom * 0.9;
  const fov = 700;
  const sz = fov / (fov + z3);
  return { sx: W/2 + x2 * sz * scale * 1.3, sy: H/2 + y2 * sz * scale * 1.3 - 30, sz: z3 };
}
 
// ===================== PICK =====================
let hoverId = null, selectedId = null;
 
function pickBuilding(mx, my) {
  for (let i = BUILDINGS.length-1; i >= 0; i--) {
    const b = BUILDINGS[i];
    const pts = getBuildingPoints(b);
    if (ptInPoly(mx, my, pts.base.map(p => project(p.x, 0, p.z)))) return b;
    if (ptInPoly(mx, my, pts.top.map(p => project(p.x, b.h, p.z)))) return b;
  }
  return null;
}
 
function ptInPoly(mx, my, pts) {
  let inside = false;
  for (let i=0, j=pts.length-1; i<pts.length; j=i++) {
    const xi=pts[i].sx, yi=pts[i].sy, xj=pts[j].sx, yj=pts[j].sy;
    if (((yi>my)!==(yj>my)) && (mx < (xj-xi)*(my-yi)/(yj-yi)+xi)) inside = !inside;
  }
  return inside;
}
 
function getBuildingPoints(b) {
  const {x,z,w,d} = b;
  return {
    base: [{x,z},{x:x+w,z},{x:x+w,z:z+d},{x,z:z+d}],
    top:  [{x,z},{x:x+w,z},{x:x+w,z:z+d},{x,z:z+d}],
  };
}
 
function handleHover(e) {
  const b = pickBuilding(e.clientX, e.clientY);
  const tooltip = document.getElementById('tooltip');
  if (b) {
    hoverId = b.id;
    canvas.style.cursor = 'pointer';
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 14) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.innerHTML = `<strong>${b.short}</strong> · ${b.type} · ${b.floors} piso(s)`;
  } else {
    hoverId = null;
    canvas.style.cursor = 'default';
    tooltip.style.display = 'none';
  }
}
 
// ===================== PANEL =====================
function openPanel(b) {
  selectedId = b.id;
  document.getElementById('p-type').textContent = b.type;
  document.getElementById('p-name').textContent = b.name;
  document.getElementById('p-loc').textContent = b.loc;
  document.getElementById('p-hours').textContent = b.hours;
  document.getElementById('p-contact').textContent = b.contact;
  document.getElementById('p-floors').textContent = `${b.floors} piso(s)`;
  const roomsEl = document.getElementById('p-rooms');
  roomsEl.innerHTML = b.rooms.map(r=>`<div class="room-chip">${r}</div>`).join('');
  document.getElementById('panel').classList.add('open');
}
function closePanel() {
  selectedId = null;
  document.getElementById('panel').classList.remove('open');
}
document.getElementById('close-panel').onclick = closePanel;
 
// ===================== LEGEND =====================
const types = [...new Set(BUILDINGS.map(b=>b.type))];
const typeColors = {};
BUILDINGS.forEach(b => typeColors[b.type] = b.color);
const leg = document.getElementById('legend');
types.forEach(t => {
  const el = document.createElement('div');
  el.className = 'leg-item';
  el.innerHTML = `<div class="leg-box" style="background:${typeColors[t]}"></div><span class="leg-label">${t}</span>`;
  leg.appendChild(el);
});
 
// ===================== FLOOR SELECTOR =====================
const floorSel = document.getElementById('floor-sel');
let activeFloor = 'all';
const maxFloors = Math.max(...BUILDINGS.map(b=>b.floors));
const allBtn = document.createElement('button');
allBtn.className = 'floor-btn active';
allBtn.textContent = 'ALL';
allBtn.onclick = () => { activeFloor='all'; document.querySelectorAll('.floor-btn').forEach(b=>b.classList.remove('active')); allBtn.classList.add('active'); };
floorSel.appendChild(allBtn);
for (let f=1; f<=maxFloors; f++) {
  const fb = document.createElement('button');
  fb.className = 'floor-btn';
  fb.textContent = f;
  fb.dataset.floor = f;
  fb.onclick = () => {
    activeFloor = f;
    document.querySelectorAll('.floor-btn').forEach(b=>b.classList.remove('active'));
    fb.classList.add('active');
  };
  floorSel.appendChild(fb);
}
 
// ===================== SEARCH =====================
const searchInput = document.getElementById('search-input');
const acEl = document.getElementById('autocomplete');
 
searchInput.addEventListener('input', () => {
  const q = searchInput.value.toLowerCase().trim();
  if (!q) { acEl.style.display='none'; return; }
  const matches = [];
  BUILDINGS.forEach(b => {
    if (b.name.toLowerCase().includes(q) || b.type.toLowerCase().includes(q)) matches.push({b, room:null});
    b.rooms.forEach(r => { if (r.toLowerCase().includes(q)) matches.push({b, room:r}); });
  });
  if (!matches.length) { acEl.style.display='none'; return; }
  acEl.innerHTML = matches.slice(0,8).map(({b,room}) => `
    <div class="ac-item" data-id="${b.id}">
      <div class="ac-dot" style="background:${b.color}"></div>
      <div class="ac-info">
        <div class="ac-name">${room ? room : b.short}</div>
        <div class="ac-desc">${room ? b.short : b.desc}</div>
      </div>
    </div>
  `).join('');
  acEl.style.display='block';
  acEl.querySelectorAll('.ac-item').forEach(el => {
    el.onclick = () => {
      const b = BUILDINGS.find(x=>x.id===el.dataset.id);
      if (b) { openPanel(b); selectedId=b.id; }
      acEl.style.display='none';
      searchInput.value='';
    };
  });
});
document.addEventListener('click', e => { if (!e.target.closest('#search-bar') && !e.target.closest('#autocomplete')) acEl.style.display='none'; });
 
// ===================== DRAWING =====================
function drawGround() {
  // Ground grid
  ctx.save();
  for (let gx = 0; gx <= 800; gx += 40) {
    const a = project(gx, 0, 0), b = project(gx, 0, 450);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 0.5; ctx.stroke();
  }
  for (let gz = 0; gz <= 450; gz += 40) {
    const a = project(0, 0, gz), b = project(800, 0, gz);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy);
    ctx.strokeStyle = 'rgba(255,255,255,0.04)'; ctx.lineWidth = 0.5; ctx.stroke();
  }
  ctx.restore();
}
 
function drawPaths() {
  PATHS.forEach(p => {
    const a = project(p.x1, 0.5, p.z1), b = project(p.x2, 0.5, p.z2);
    ctx.beginPath(); ctx.moveTo(a.sx, a.sy); ctx.lineTo(b.sx, b.sy);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 6; ctx.lineCap='round'; ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 12; ctx.stroke();
  });
}
 
function drawTree(x, z) {
  const base = project(x, 0, z);
  const top = project(x, 22, z);
  // trunk
  ctx.beginPath();
  ctx.moveTo(base.sx, base.sy);
  ctx.lineTo(top.sx, top.sy);
  ctx.strokeStyle = '#92400e'; ctx.lineWidth = 2; ctx.stroke();
  // canopy
  const r = Math.max(3, 10 * cam.zoom);
  ctx.beginPath();
  ctx.arc(top.sx, top.sy, r, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(34,197,94,0.7)'; ctx.fill();
  ctx.beginPath();
  ctx.arc(top.sx-r*0.3, top.sy-r*0.3, r*0.7, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(74,222,128,0.5)'; ctx.fill();
}
 
function drawBuilding(b) {
  const floorHeight = b.h / b.floors;
  const visibleFloors = activeFloor==='all' ? b.floors : Math.min(parseInt(activeFloor), b.floors);
  const totalH = floorHeight * visibleFloors;
 
  const isHovered = hoverId === b.id;
  const isSelected = selectedId === b.id;
  const alpha = (activeFloor==='all') ? 1 : (b.floors >= parseInt(activeFloor) ? 1 : 0.25);
 
  const {x,z,w,d} = b;
  ctx.globalAlpha = alpha;
 
  // Ground shadow
  const corners = [{x,z},{x:x+w,z},{x:x+w,z:z+d},{x,z:z+d}];
  ctx.beginPath();
  corners.forEach((c,i) => {
    const p = project(c.x+4, -2, c.z+4);
    i===0 ? ctx.moveTo(p.sx,p.sy) : ctx.lineTo(p.sx,p.sy);
  });
  ctx.closePath();
  ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fill();
 
  // --- Draw floors ---
  for (let f = 0; f < visibleFloors; f++) {
    const y0 = f * floorHeight;
    const y1 = y0 + floorHeight;
    const frac = f / b.floors;
    const isTopFloor = (f === visibleFloors - 1);
 
    // Front face (z+d side)
    const fl = project(x,   y0, z+d), fr = project(x+w, y0, z+d);
    const tl = project(x,   y1, z+d), tr = project(x+w, y1, z+d);
 
    // Side face (x+w side)
    const sfr = project(x+w, y0, z),   sfb = project(x+w, y0, z+d);
    const str = project(x+w, y1, z),   stb = project(x+w, y1, z+d);
 
    // Color per floor
    const shade = frac * 0.35;
    const baseColor = b.color;
    const darkColor = b.colorDark;
 
    // Front
    ctx.beginPath(); ctx.moveTo(fl.sx,fl.sy); ctx.lineTo(fr.sx,fr.sy); ctx.lineTo(tr.sx,tr.sy); ctx.lineTo(tl.sx,tl.sy); ctx.closePath();
    const frontGrad = ctx.createLinearGradient(fl.sx, fl.sy, tl.sx, tl.sy);
    frontGrad.addColorStop(0, adjustColor(darkColor, -shade*30));
    frontGrad.addColorStop(1, adjustColor(baseColor, shade*10));
    ctx.fillStyle = frontGrad; ctx.fill();
    // Floor line
    ctx.beginPath(); ctx.moveTo(fl.sx,fl.sy); ctx.lineTo(fr.sx,fr.sy);
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth=0.5; ctx.stroke();
 
    // Windows on front
    if (cam.zoom > 0.6 && !isTopFloor) {
      const wCount = Math.max(1, Math.floor(w/35));
      for (let wi=0; wi<wCount; wi++) {
        const wfrac = (wi+0.5)/wCount;
        const wx1 = lerp(x, x+w, wfrac-0.1);
        const wx2 = lerp(x, x+w, wfrac+0.1);
        const wy1 = y0 + floorHeight*0.25, wy2 = y0 + floorHeight*0.75;
        const wp1 = project(wx1, wy1, z+d+0.1), wp2 = project(wx2, wy1, z+d+0.1);
        const wp3 = project(wx2, wy2, z+d+0.1), wp4 = project(wx1, wy2, z+d+0.1);
        ctx.beginPath(); ctx.moveTo(wp1.sx,wp1.sy); ctx.lineTo(wp2.sx,wp2.sy); ctx.lineTo(wp3.sx,wp3.sy); ctx.lineTo(wp4.sx,wp4.sy); ctx.closePath();
        ctx.fillStyle = (isHovered||isSelected) ? 'rgba(255,250,200,0.6)' : 'rgba(180,220,255,0.2)'; ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=0.5; ctx.stroke();
      }
    }
 
    // Side
    ctx.beginPath(); ctx.moveTo(sfb.sx,sfb.sy); ctx.lineTo(sfr.sx,sfr.sy); ctx.lineTo(str.sx,str.sy); ctx.lineTo(stb.sx,stb.sy); ctx.closePath();
    const sideGrad = ctx.createLinearGradient(sfr.sx, sfr.sy, str.sx, str.sy);
    sideGrad.addColorStop(0, adjustColor(darkColor, -shade*50));
    sideGrad.addColorStop(1, adjustColor(darkColor, shade*5));
    ctx.fillStyle = sideGrad; ctx.fill();
    ctx.beginPath(); ctx.moveTo(sfb.sx,sfb.sy); ctx.lineTo(sfr.sx,sfr.sy);
    ctx.strokeStyle='rgba(255,255,255,0.08)'; ctx.lineWidth=0.5; ctx.stroke();
  }
 
  // TOP FACE
  const topCorners = [{x,z},{x:x+w,z},{x:x+w,z:z+d},{x,z:z+d}];
  ctx.beginPath();
  topCorners.forEach((c,i) => {
    const p = project(c.x, totalH, c.z);
    i===0 ? ctx.moveTo(p.sx,p.sy) : ctx.lineTo(p.sx,p.sy);
  });
  ctx.closePath();
  const topGrad = ctx.createRadialGradient(
    project(x+w/2,totalH,z+d/2).sx, project(x+w/2,totalH,z+d/2).sy, 0,
    project(x+w/2,totalH,z+d/2).sx, project(x+w/2,totalH,z+d/2).sy, 60
  );
  topGrad.addColorStop(0, lighten(b.color, 30));
  topGrad.addColorStop(1, b.color);
  ctx.fillStyle = topGrad; ctx.fill();
 
  // Outline if selected/hovered
  if (isSelected || isHovered) {
    const allFaces = [
      [project(x,0,z+d),project(x+w,0,z+d),project(x+w,totalH,z+d),project(x,totalH,z+d)],
      [project(x+w,0,z),project(x+w,0,z+d),project(x+w,totalH,z+d),project(x+w,totalH,z)],
      topCorners.map(c=>project(c.x,totalH,c.z)),
    ];
    allFaces.forEach(face => {
      ctx.beginPath();
      face.forEach((p,i) => i===0 ? ctx.moveTo(p.sx,p.sy) : ctx.lineTo(p.sx,p.sy));
      ctx.closePath();
      ctx.strokeStyle = isSelected ? b.color : 'rgba(255,255,255,0.5)';
      ctx.lineWidth = isSelected ? 2.5 : 1.5;
      ctx.stroke();
    });
    if (isSelected) {
      const topC = project(x+w/2, totalH+8, z+d/2);
      ctx.beginPath();
      ctx.arc(topC.sx, topC.sy, 5, 0, Math.PI*2);
      ctx.fillStyle = b.color; ctx.fill();
      ctx.beginPath();
      ctx.arc(topC.sx, topC.sy, 9, 0, Math.PI*2);
      ctx.strokeStyle = b.color; ctx.lineWidth=2; ctx.stroke();
    }
  }
 
  // Label on top
  if (cam.zoom > 0.55) {
    const labelPos = project(x+w/2, totalH + 5, z+d/2);
    ctx.save();
    ctx.globalAlpha = alpha * (isHovered||isSelected ? 1 : 0.85);
    ctx.font = `bold ${Math.max(9, 11*cam.zoom)}px 'Syne',sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffffff';
    ctx.shadowColor = 'rgba(0,0,0,0.8)';
    ctx.shadowBlur = 6;
    ctx.fillText(b.short, labelPos.sx, labelPos.sy);
    ctx.restore();
  }
 
  ctx.globalAlpha = 1;
}
 
function lerp(a,b,t){return a+(b-a)*t;}
function lighten(hex, pct) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), bl = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+pct)},${Math.min(255,g+pct)},${Math.min(255,bl+pct)})`;
}
function adjustColor(hex, pct) {
  if (!hex || !hex.startsWith('#')) return hex;
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), bl = parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,Math.max(0,r+pct))},${Math.min(255,Math.max(0,g+pct))},${Math.min(255,Math.max(0,bl+pct))})`;
}
 
// ===================== MINIMAP =====================
function drawMinimap() {
  const mc = document.getElementById('mini');
  const mctx = mc.getContext('2d');
  mctx.clearRect(0,0,120,80);
  mctx.fillStyle='rgba(17,24,39,1)';
  mctx.fillRect(0,0,120,80);
 
  const sx = 120/800, sy = 80/450;
  BUILDINGS.forEach(b => {
    mctx.fillStyle = b.id===selectedId ? '#fff' : b.color;
    mctx.globalAlpha = 0.8;
    mctx.fillRect(b.x*sx, b.z*sy, b.w*sx, b.d*sy);
  });
  mctx.globalAlpha = 1;
}
 
// ===================== RENDER LOOP =====================
function draw() {
  ctx.clearRect(0,0,W,H);
 
  // Smooth camera
  cam.angleX += (cam.targetAngleX - cam.angleX) * 0.12;
  cam.angleY += (cam.targetAngleY - cam.angleY) * 0.12;
  cam.zoom   += (cam.targetZoom   - cam.zoom)   * 0.12;
 
  // Sky gradient
  const sky = ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#0a0e1a');
  sky.addColorStop(1,'#111827');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
 
  drawGround();
  drawPaths();
 
  // Sort buildings by depth
  const sorted = [...BUILDINGS].sort((a,b) => {
    const pa = project(a.x+a.w/2,0,a.z+a.d/2);
    const pb = project(b.x+b.w/2,0,b.z+b.d/2);
    return pb.sz - pa.sz;
  });
 
  sorted.forEach(b => drawBuilding(b));
 
  TREES.forEach(t => drawTree(t.x, t.z));
 
  drawMinimap();
  requestAnimationFrame(draw);
}
 
// Remove hint after animation
setTimeout(() => {
  const h = document.getElementById('hint');
  if (h) h.remove();
}, 4500);
 
resize();
</script>
